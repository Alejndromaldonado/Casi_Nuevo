<body class="text-primary-900 antialiased min-h-screen flex flex-col">

    <script type="text/babel">
        // Configuración y Constantes
        const SUPABASE_URL = "https://bsuhcxvjreasnuvxsgom.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzdWhjeHZqcmVhc251dnhzZ29tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4ODQ1NzgsImV4cCI6MjA5OTQ2MDU3OH0.SEhaAwFXP7T6e7KJk-arKw5cnwbMZPG3vXNp8S0v1XM";
        
        const CLOUDINARY_CLOUD_NAME = "m0qi4kc9";

        const WHATSAPP_PHONE = "573027271230";
        
        // Inicializar cliente Supabase
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Sistema de Caché Frontend (5 minutos)
        const CACHE_KEY = "casi_nuevo_products_cache";
        const CACHE_TTL = 5 * 60 * 1000;

        const getCachedProducts = () => {
            try {
                const cached = sessionStorage.getItem(CACHE_KEY);
                if (!cached) return null;
                const { data, timestamp } = JSON.parse(cached);
                if (Date.now() - timestamp > CACHE_TTL) {
                    sessionStorage.removeItem(CACHE_KEY);
                    return null;
                }
                return data;
            } catch (e) {
                return null;
            }
        };

        const setCachedProducts = (data) => {
            try {
                sessionStorage.setItem(CACHE_KEY, JSON.stringify({
                    data,
                    timestamp: Date.now()
                }));
            } catch (e) {}
        };

        const invalidateCache = () => {
            sessionStorage.removeItem(CACHE_KEY);
        };

        // Formateador de precios en COP
        const formatCOP = (value) => {
            return new Intl.NumberFormat('es-CO', {
                style: 'currency',
                currency: 'COP',
                minimumFractionDigits: 0,
                maximumFractionDigits: 0
            }).format(value);
        };

        // Hook para bloquear scroll en modal
        const useLockBodyScroll = (lock) => {
            React.useLayoutEffect(() => {
                if (!lock) return;
                const originalStyle = window.getComputedStyle(document.body).overflow;
                document.body.style.overflow = 'hidden';
                return () => {
                    document.body.style.overflow = originalStyle;
                };
            }, [lock]);
        };

        // --- COMPONENTES PÚBLICOS ---

        // Header Sticky
        const Header = ({ isAdmin, onLogout }) => {
            const [isMenuOpen, setIsMenuOpen] = React.useState(false);
            return (
                <header className="bg-white shadow-sm sticky top-0 z-40 border-b border-primary-100">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex items-center justify-between h-16">
                            <div className="flex-shrink-0 flex items-center">
                                <a href="#" className="text-2xl font-extrabold tracking-tight text-primary-900 flex items-center gap-2">
                                    <span>📦 Casi Nuevo</span>
                                    <span className="text-xs bg-accent-500 text-white font-semibold py-0.5 px-2 rounded-full uppercase tracking-wider">Mudanza</span>
                                </a>
                            </div>
                            <div className="hidden md:flex items-center space-x-6">
                                <a href="#" className="text-primary-500 hover:text-primary-900 font-medium transition-colors">Inicio</a>
                                <a href="#products-list" className="text-primary-500 hover:text-primary-900 font-medium transition-colors">Productos</a>
                                {isAdmin ? (
                                    <>

                                        <button onClick={onLogout} className="px-4 py-2 border border-red-500 text-red-500 hover:bg-red-50 font-medium rounded-lg text-sm transition-all">
                                            Cerrar Sesión
                                        </button>
                                    </>
                                ) : (
                                    <a href="#/admin" className="text-primary-500 hover:text-primary-900 text-sm font-medium transition-colors border border-primary-100 py-1.5 px-3 rounded-lg hover:bg-primary-50">Acceso Admin</a>
                                )}
                            </div>
                            <div className="md:hidden">
                                <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="p-2 text-primary-500 hover:text-primary-900 focus:outline-none">
                                    <svg className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        {isMenuOpen ? (
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                        ) : (
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16M4 18h16" />
                                        )}
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    {/* Menú móvil */}
                    {isMenuOpen && (
                        <div className="md:hidden bg-white border-t border-primary-100 py-2 px-4 space-y-2 animate-fade-in shadow-lg">
                            <a href="#" onClick={() => setIsMenuOpen(false)} className="block py-2 text-primary-500 hover:text-primary-900 font-medium">Inicio</a>
                            <a href="#products-list" onClick={() => setIsMenuOpen(false)} className="block py-2 text-primary-500 hover:text-primary-900 font-medium">Productos</a>
                            {isAdmin ? (
                                <>

                                    <button onClick={() => { onLogout(); setIsMenuOpen(false); }} className="w-full text-left block py-2 text-red-500 font-medium">
                                        Cerrar Sesión
                                    </button>
                                </>
                            ) : (
                                <a href="#/admin" onClick={() => setIsMenuOpen(false)} className="block py-2 text-primary-500 hover:text-primary-900 text-sm font-medium">Acceso Admin</a>
                            )}
                        </div>
                    )}
                </header>
            );
        };

        // Hero con Countdown
        const Hero = () => {
            const [timeLeft, setTimeLeft] = React.useState({ days: 0, hours: 0, minutes: 0, seconds: 0 });

            React.useEffect(() => {
                // Mudanza fijada a mediados de agosto 2026 (ej: 15 de agosto 2026)
                const targetDate = new Date("August 15, 2026 00:00:00").getTime();
                
                const updateCountdown = () => {
                    const now = new Date().getTime();
                    const difference = targetDate - now;

                    if (difference <= 0) {
                        setTimeLeft({ days: 0, hours: 0, minutes: 0, seconds: 0 });
                        return;
                    }

                    const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                    setTimeLeft({ days, hours, minutes, seconds });
                };

                updateCountdown();
                const timer = setInterval(updateCountdown, 1000);
                return () => clearInterval(timer);
            }, []);

            const items = [
                { label: 'Días', value: timeLeft.days },
                { label: 'Horas', value: timeLeft.hours },
                { label: 'Mins', value: timeLeft.minutes },
                { label: 'Segs', value: timeLeft.seconds },
            ];

            return (
                <div className="bg-gradient-to-br from-primary-900 via-primary-800 to-primary-950 text-white relative overflow-hidden py-16 px-4 sm:px-6 lg:px-8 border-b border-primary-950">
                    <div className="absolute inset-0 opacity-10 bg-[radial-gradient(#f59e0b_1px,transparent_1px)] [background-size:16px_16px]"></div>
                    <div className="relative max-w-4xl mx-auto text-center flex flex-col items-center">
                        <span className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-accent-500/20 text-accent-400 border border-accent-500/30 mb-6 uppercase tracking-wider animate-pulse">
                            🔥 LIQUIDACIÓN TOTAL POR MUDANZA
                        </span>
                        <h1 className="text-4xl sm:text-6xl font-extrabold tracking-tight text-white mb-6 leading-tight">
                            ¡Gran Venta de Garaje!
                        </h1>
                        <p className="text-lg sm:text-xl text-primary-100 max-w-2xl mb-8 leading-relaxed font-light">
                            Vendo todos los muebles y electrodomésticos de mi apartamento. Precios de oportunidad, entrega inmediata.
                        </p>

                        <div className="flex gap-3 sm:gap-4 mb-8">
                            {items.map((item, idx) => (
                                <div key={idx} className="flex flex-col items-center bg-white/10 backdrop-blur-md rounded-xl p-3 sm:p-4 min-w-[70px] sm:min-w-[85px] border border-white/10 shadow-lg">
                                    <span className="text-2xl sm:text-3xl font-bold tracking-tight text-accent-400">{String(item.value).padStart(2, '0')}</span>
                                    <span className="text-[10px] sm:text-xs text-primary-300 font-medium uppercase mt-1">{item.label}</span>
                                </div>
                            ))}
                        </div>

                        <div className="text-sm text-primary-200 border-t border-white/10 pt-4 flex flex-col sm:flex-row gap-4 items-center justify-center">
                            <span className="flex items-center gap-1.5">📍 Bogotá, Colombia</span>
                            <span className="hidden sm:inline">•</span>
                            <span className="flex items-center gap-1.5">🚚 Retiro a coordinar por comprador</span>
                        </div>

                        <div className="mt-8 flex gap-4">
                            <a href="#products-list" className="px-6 py-3 bg-accent-500 hover:bg-accent-600 text-primary-900 font-bold rounded-lg shadow-lg hover:shadow-accent-500/25 transition-all text-base transform hover:-translate-y-0.5">
                                Ver Catálogo Completo
                            </a>
                        </div>
                    </div>
                </div>
            );
        };

        // Ficha del producto
        const ProductCard = ({ product, onSelect, onSelectReference }) => {
            const isSold = product.estado_disponibilidad === 'vendido';
            const isReserved = product.estado_disponibilidad === 'reservado';
            
            const [showShare, setShowShare] = React.useState(false);
            const shareUrl = `${window.location.origin}${window.location.pathname}#product-${product.id}`;
            const shareText = `¡Mira esta oportunidad en Casi Nuevo! 📦\n\n*${product.titulo}*\nPrecio: ${formatCOP(product.precio)}\n\n${product.descripcion || ''}\n\nVer más fotos y detalles aquí: ${shareUrl}`;
            const waShareLink = `https://api.whatsapp.com/send?text=${encodeURIComponent(shareText)}`;
            const fbShareLink = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`;

            const handleCopyLink = (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(shareUrl);
                alert('¡Enlace del producto copiado al portapapeles!');
                setShowShare(false);
            };

            // Link direct text options
            const textInfo = `Hola, me interesa el producto "${product.titulo}".`;
            const textPay = `Hola, quiero pagar el "${product.titulo}" con tarjeta. Solicito el link de pago.`;

            const linkInfo = `https://wa.me/${WHATSAPP_PHONE}?text=${encodeURIComponent(textInfo)}`;
            const linkPay = `https://wa.me/${WHATSAPP_PHONE}?text=${encodeURIComponent(textPay)}`;

            const cardOpacityClass = isSold 
                ? 'opacity-60 grayscale hover:grayscale-0 hover:opacity-100 transition-all duration-300 border-primary-100' 
                : isReserved 
                    ? 'opacity-85 border-amber-200 hover:opacity-100 transition-all duration-300' 
                    : 'border-primary-100';

            return (
                <div className={`bg-white rounded-2xl border overflow-hidden flex flex-col group hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 relative ${cardOpacityClass}`}>
                    {/* Badge disponibilidad */}
                    {isSold && (
                        <div className="absolute top-3 left-3 bg-red-600 text-white text-xs font-bold px-3 py-1 rounded-full z-10 shadow-md uppercase tracking-wider">
                            Vendido
                        </div>
                    )}
                    {isReserved && (
                        <div className="absolute top-3 left-3 bg-accent-500 text-white text-xs font-bold px-3 py-1 rounded-full z-10 shadow-md uppercase tracking-wider">
                            Reservado
                        </div>
                    )}
                    
                    {/* Imagen */}
                    <div className="relative aspect-[4/3] bg-primary-100 overflow-hidden cursor-pointer" onClick={() => onSelect(product)}>

                            loading="lazy"
                            className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" 
                        />
                        <div className="absolute top-3 right-3 bg-primary-900/80 backdrop-blur-sm text-white text-[10px] font-semibold px-2 py-0.5 rounded-full uppercase tracking-wider">

                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M8.684 10.742l4.636-2.268m0 0a3 3 0 111.164 1.834L9.848 12.58m0 0a3 3 0 11-1.164-1.834L14.338 12.94m0 0a3 3 0 11-1.164 1.834" />
                                </svg>
                            </button>
                            
                            {showShare && (
                                <div className="absolute right-0 bottom-10 bg-white border border-primary-100 rounded-xl shadow-lg p-2 flex flex-col gap-1 z-30 min-w-[130px] animate-fade-in" onClick={(e) => e.stopPropagation()}>
                                    <a 
                                        href={waShareLink} 
                                        target="_blank" 
                                        rel="noopener noreferrer" 
                                        onClick={() => setShowShare(false)}
                                        className="flex items-center gap-2 px-2.5 py-1.5 hover:bg-primary-50 text-primary-700 hover:text-whatsapp-500 rounded-lg text-[11px] font-semibold transition-colors"

                                    </a>
                                    <a

                                        rel="noopener noreferrer" 
                                        onClick={() => setShowShare(false)}

                                    >
                                        <span>🔵 Facebook</span>
                                    </a>
                                    <button 
                                        onClick={handleCopyLink}
                                        className="flex items-center gap-2 px-2.5 py-1.5 hover:bg-primary-50 text-primary-700 hover:text-accent-600 rounded-lg text-[11px] font-semibold text-left transition-colors w-full cursor-pointer"
                                    >
                                        <span>🔗 Copiar Enlace</span>
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Contenido */}
                    <div className="p-5 flex flex-col flex-grow">
                        <h3 onClick={() => onSelect(product)} className="text-base font-bold text-primary-900 truncate mb-1 group-hover:text-accent-600 transition-colors cursor-pointer">
                            {product.titulo}
                        </h3>
                        <p className="text-xs text-primary-500 line-clamp-2 flex-grow mb-4 font-light">
                            {product.descripcion || 'Sin descripción disponible.'}
                        </p>
                        
                        <div className="flex flex-col gap-1 mb-4">
                            <span className="text-xl font-extrabold text-primary-900 tracking-tight">
                                {formatCOP(product.precio)}
                            </span>
                            <span className="text-[10px] text-accent-600 font-semibold uppercase tracking-wider flex items-center gap-1">
                                💸 Precio Especial Cop
                            </span>
                        </div>

                        {/* Botón Referencia Comercial */}
                        {product.url_referencia && (
                            <button 
                                onClick={(e) => {
                                    e.stopPropagation();
                                    onSelectReference(product.url_referencia);
                                }}
                                className="w-full py-2 bg-primary-50 hover:bg-primary-100 text-primary-800 border border-primary-100 font-bold rounded-xl text-[10px] uppercase tracking-wider flex items-center justify-center gap-1.5 transition-all mb-3 cursor-pointer"
                            >
                                <span>🔎 Ver Precio Referencia Nuevo</span>
                            </button>
                        )}

                        {/* Botones WhatsApp */}
                        {!isSold ? (
                            <div className="space-y-2 mt-auto">
                                <a 
                                    href={linkInfo} 
                                    target="_blank"

                                >
                                    <svg className="w-4 h-4 fill-current" viewBox="0 0 24 24">
                                        <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.724-1.455L0 24zm6.035-4.43c1.614.957 3.5 1.462 5.922 1.464 5.394 0 9.784-4.39 9.788-9.788.002-2.613-1.013-5.07-2.86-6.92C17.097 2.476 14.643 1.46 12.015 1.46c-5.4 0-9.79 4.39-9.794 9.79-.001 2.146.56 4.238 1.626 6.079l-.999 3.65 3.744-.981zm12.333-5.263c-.305-.152-1.802-.89-2.08-.99-.279-.1-.482-.152-.684.152-.202.303-.781.99-.957 1.189-.176.199-.352.227-.657.076-.305-.152-1.287-.475-2.45-1.514-.906-.809-1.517-1.809-1.695-2.112-.178-.304-.019-.469.133-.62.137-.136.305-.355.457-.532.152-.178.203-.304.305-.507.102-.202.051-.38-.025-.532-.076-.152-.684-1.65-.937-2.256-.247-.597-.497-.514-.684-.523-.177-.008-.38-.01-.583-.01-.203 0-.532.076-.81.38-.279.304-1.064 1.04-1.064 2.532s1.088 2.932 1.24 3.134c.152.202 2.14 3.268 5.184 4.577.724.311 1.289.497 1.728.636.727.232 1.39.199 1.912.121.583-.087 1.802-.736 2.055-1.447.253-.71.253-1.32.177-1.447-.076-.127-.279-.203-.583-.356z"/>
                                    </svg>
                                    <span>Pedir Información</span>
                                </a>
                                <a 
                                    href={linkPay} 
                                    target="_blank" 
                                    rel="noopener noreferrer" 
                                    className="w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-whatsapp-600 hover:bg-whatsapp-600/90 text-white font-semibold rounded-xl text-xs transition-all shadow-sm hover:shadow-md"
                                >
                                    💳 Comprar ahora - Tarjeta
                                </a>
                            </div>
                        ) : (
                            <div className="w-full text-center py-2.5 bg-primary-100 text-primary-500 font-bold rounded-xl text-xs cursor-not-allowed mt-auto">
                                Producto Vendido
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Grid de productos
        const ProductGrid = ({ products, onSelect, onSelectReference, loading }) => {
            if (loading) {
                return (
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                        {[1, 2, 3, 4, 5, 6].map((i) => (
                            <div key={i} className="bg-white rounded-2xl border border-primary-50 overflow-hidden flex flex-col h-[400px] animate-pulse">
                                <div className="bg-primary-100 aspect-[4/3] w-full" />
                                <div className="p-5 flex-grow space-y-3">
                                    <div className="h-4 bg-primary-100 rounded w-2/3" />
                                    <div className="h-3 bg-primary-100 rounded w-full" />
                                    <div className="h-3 bg-primary-100 rounded w-5/6" />
                                    <div className="h-6 bg-primary-100 rounded w-1/3 pt-4" />
                                    <div className="h-10 bg-primary-100 rounded w-full mt-auto" />
                                </div>
                            </div>
                        ))}
                    </div>
                );
            }

            if (products.length === 0) {
                return (
                    <div className="text-center py-16 bg-white border border-primary-50 rounded-3xl">
                        <span className="text-4xl">🔍</span>
                        <h3 className="text-lg font-bold text-primary-900 mt-4">No se encontraron productos</h3>
                        <p className="text-sm text-primary-500 font-light mt-1">Prueba seleccionando otra categoría o cambiando la búsqueda.</p>
                    </div>
                );
            }

            return (
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                    {products.map((product) => (
                        <ProductCard key={product.id} product={product} onSelect={onSelect} onSelectReference={onSelectReference} />
                    ))}
                </div>
            );
        };

                setImproving(true);
                try {
                    const res = await fetch('/api/improve-description', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ description: descripcion })
                    });
                    const data = await res.json();
                    if (data.improved) {
                        setDescripcion(data.improved);
                    } else if (data.error) {
                        alert(`Error de IA: ${data.error}`);
                    }
                } catch (err) {
                    console.error('Error improving description:', err);
                    alert('Error de red al intentar mejorar la descripción.');
                }
                setImproving(false);
            };

            React.useEffect(() => {
                if (product) {
                    setTitulo(product.titulo);
                    setDescripcion(product.descripcion || '');
                    setPrecio(product.precio);
                    setUrlReferencia(product.url_referencia || '');
                    
                    const standardCategories = ['Muebles', 'Electrodomésticos', 'Decoración', 'Cocina', 'Baño'];
                    if (standardCategories.includes(product.categoria)) {
                        setCategoria(product.categoria);
                        setIsCustomCategory(false);
                        setCustomCategory('');
                    } else {
                        setCategoria('__custom__');
                        setIsCustomCategory(true);
                        setCustomCategory(product.categoria || '');
                    }

                    setEstado(product.estado_disponibilidad);
                    if (product.imagenes_urls && product.imagenes_urls.length > 0) {
                        setImageUrls(product.imagenes_urls);
                    } else if (product.url_imagen_cloudinary) {
                        setImageUrls([product.url_imagen_cloudinary]);
                    } else {
                        setImageUrls([]);
                    }
                }
            }, [product]);

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (imageUrls.length >= 5) {
                    alert('Puedes subir hasta 5 fotos por producto.');
                    return;
                }
                setUploading(true);

                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
                        method: 'POST',
                        body: formData
                    });

                    const data = await res.json();
                    if (data.secure_url) {
                        // Aplicar transformaciones Cloudinary para optimización (max 800px ancho, auto webp, auto calidad)
                        const optimizedUrl = data.secure_url.replace('/upload/', '/upload/w_800,f_auto,q_auto/');
                        setImageUrls([...imageUrls, optimizedUrl]);
                    }
                } catch (err) {
                    console.error('Error uploading to Cloudinary:', err);
                    alert('Error al subir la imagen a Cloudinary');
                }
                setUploading(false);
                e.target.value = '';
            };

            const removeImage = (indexToRemove) => {
                setImageUrls(imageUrls.filter((_, idx) => idx !== indexToRemove));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (imageUrls.length === 0) {
                    alert('Por favor sube al menos una foto del producto.');
                    return;
                }
                const finalCategory = isCustomCategory ? customCategory.trim() : categoria;
                if (!finalCategory) {
                    alert('Por favor especifica la categoría.');
                    return;
                }
                setSaving(true);

                const firstImage = imageUrls[0] || '';
                const productData = {
                    titulo,
                    descripcion,
                    precio: parseFloat(precio),
                    categoria: finalCategory,
                    estado_disponibilidad: estado,
                    url_imagen_cloudinary: firstImage,
                    imagenes_urls: imageUrls,
                    url_referencia: urlReferencia.trim()
                };

                let res;
                if (product) {
                    // Update
                    res = await supabase
                        .from('products')
                        .update(productData)
                        .eq('id', product.id);
                } else {
                    // Insert
                    res = await supabase
                        .from('products')
                        .insert([productData]);
                }

                if (res.error) {
                    console.error('Error saving product:', res.error);
                    alert('Error al guardar el producto.');
                } else {
                    invalidateCache();
                    onSuccess();
                }
                setSaving(false);
            };

            return (
                <div className="bg-white p-6 rounded-3xl border border-primary-100 shadow-lg animate-slide-up mb-8">

                                    required 
                                    value={titulo}
                                    onChange={(e) => setTitulo(e.target.value)}

                                    placeholder="Ej: Sofá 3 puestos, Nevera LG..."
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-semibold text-primary-600 mb-1 uppercase tracking-wide">Precio (COP)</label>
                                <input 
                                    type="number" 
                                    required 
                                    value={precio}
                                    onChange={(e) => setPrecio(e.target.value)}
                                    className="w-full px-4 py-2.5 bg-primary-50 border border-primary-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent-500 text-sm text-primary-900"
                                    placeholder="Ej: 1500000"
                                />
                            </div>
                        </div>

                        <div>
                            <label className="block text-xs font-semibold text-primary-600 mb-1 uppercase tracking-wide">URL de Referencia (Sitio Web Nuevo - Opcional)</label>
                            <input

                                value={urlReferencia}
                                onChange={(e) => setUrlReferencia(e.target.value)}
                                className="w-full px-4 py-2.5 bg-primary-50 border border-primary-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent-500 text-sm text-primary-900"
                                placeholder="Ej: https://www.exito.com/p/nevera-lg..."
                            />
                        </div>

                        <div>
                            <div className="flex justify-between items-center mb-1">
                                <label className="block text-xs font-semibold text-primary-600 uppercase tracking-wide">Descripción Detallada</label>
                                <button
                                    type="button"
                                    onClick={handleImproveDescription}
                                    disabled={improving || !descripcion.trim()}
                                    className="px-2.5 py-1 bg-accent-100 hover:bg-accent-200 disabled:bg-primary-50 disabled:text-primary-400 text-accent-800 disabled:opacity-50 text-[10px] font-bold rounded-lg transition-all flex items-center gap-1 cursor-pointer"
                                    title="Mejorar redacción con Inteligencia Artificial"

                                    {improving ? '⏳ Mejorando...' : '✨ Mejorar con IA'}
                                </button>

                            <textarea

                                    <option value="Electrodomésticos">Electrodomésticos</option>
                                    <option value="Decoración">Decoración</option>

                                    <option value="__custom__">+ Otra categoría...</option>

                                {isCustomCategory && (
                                    <div className="mt-2 animate-fade-in">
                                        <label className="block text-[10px] font-semibold text-primary-500 mb-1 uppercase tracking-wide">Nombre de la Categoría Personalizada</label>
                                        <input 
                                            type="text"
                                            required
                                            value={customCategory}
                                            onChange={(e) => setCustomCategory(e.target.value)}
                                            className="w-full px-4 py-2 bg-primary-50 border border-primary-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent-500 text-xs text-primary-800 font-semibold"

                            <div>

                                    disabled={imageUrls.length >= 5 || uploading}
                                    className="w-full text-xs text-primary-500 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-primary-100 file:text-primary-800 hover:file:bg-primary-200 cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed"
                                />

                        {uploading && (

                                    {imageUrls.map((url, idx) => (
                                        <div key={idx} className="relative w-28 h-20 rounded-xl overflow-hidden border border-primary-100 group shadow-sm bg-primary-50">
                                            <img src={url} alt={`Preview ${idx + 1}`} className="w-full h-full object-cover" />
                                            <button 
                                                type="button" 
                                                onClick={() => removeImage(idx)}
                                                className="absolute top-1 right-1 p-1 bg-red-600 hover:bg-red-700 text-white rounded-full shadow-md transition-all"
                                            >
                                                <svg className="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M6 18L18 6M6 6l12 12" />
                                                </svg>
                                            </button>
                                            <span className="absolute bottom-1 left-1 px-1.5 py-0.5 bg-black/60 text-white text-[8px] rounded font-semibold uppercase">

                        <div className="flex gap-3 justify-end pt-4 border-t border-primary-50">

                                onClick={onCancel}
                                className="px-5 py-2.5 border border-primary-200 text-primary-600 hover:bg-primary-50 font-bold rounded-xl text-sm transition-all"
                            >
                                Cancelar
                            </button>
                            <button 
                                type="submit" 
                                disabled={saving || uploading}
                                className="px-6 py-2.5 bg-primary-900 hover:bg-primary-800 text-white font-bold rounded-xl text-sm transition-all shadow-md disabled:opacity-50"
                            >
                                {saving ? 'Guardando...' : 'Guardar Artículo'}
                            </button>
                        </div>
                    </form>
                </div>
            );
        };

        // Panel de Control Administrador (CRUD Dashboard)
        const AdminDashboard = () => {

            const [currentEdit, setCurrentEdit] = React.useState(null);
            const [isAdding, setIsAdding] = React.useState(false);
            
            // Filtros de columnas
            const [filterTitle, setFilterTitle] = React.useState('');
            const [filterCategory, setFilterCategory] = React.useState('Todos');
            const [filterStatus, setFilterStatus] = React.useState('Todos');

            const fetchAllProducts = async () => {
                setLoading(true);
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (!error && data) {
                    setProducts(data);
                } else {
                    console.error('Error fetching admin products:', error);
                }
                setLoading(false);
            };

            React.useEffect(() => {
                fetchAllProducts();
            }, []);

            const handleDelete = async (id) => {
                if (!confirm('¿Estás seguro de eliminar este producto del inventario?')) return;
                
                const { error } = await supabase
                    .from('products')
                    .delete()
                    .eq('id', id);

                if (error) {
                    alert('Error al eliminar producto.');
                } else {
                    invalidateCache();
                    fetchAllProducts();
                }
            };

            const handleInlineStatusChange = async (id, newStatus) => {
                const { error } = await supabase
                    .from('products')
                    .update({ estado_disponibilidad: newStatus })
                    .eq('id', id);
                
                if (error) {
                    alert('Error al actualizar el estado.');
                } else {
                    invalidateCache();
                    fetchAllProducts();
                }
            };

            const handleInlinePriceChange = async (id, newPrice) => {
                if (isNaN(newPrice) || newPrice < 0) return;
                const { error } = await supabase
                    .from('products')
                    .update({ precio: newPrice })
                    .eq('id', id);
                
                if (error) {
                    alert('Error al actualizar el precio.');
                } else {
                    invalidateCache();
                    fetchAllProducts();
                }
            };

            const filteredProducts = React.useMemo(() => {
                return products.filter(p => {
                    const matchTitle = !filterTitle || 
                        p.titulo.toLowerCase().includes(filterTitle.toLowerCase()) || 
                        (p.descripcion && p.descripcion.toLowerCase().includes(filterTitle.toLowerCase()));
                    const matchCategory = filterCategory === 'Todos' || p.categoria === filterCategory;
                    const matchStatus = filterStatus === 'Todos' || p.estado_disponibilidad === filterStatus;
                    return matchTitle && matchCategory && matchStatus;
                });
            }, [products, filterTitle, filterCategory, filterStatus]);

            return (
                <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow w-full animate-fade-in">

                            >
                                <span>➕ Nuevo Artículo</span>
                            </button>

                    </div>

                    {(isAdding || currentEdit) && (
                        <ProductForm 
                            product={currentEdit} 
                            onCancel={() => { setIsAdding(false); setCurrentEdit(null); }}
                            onSuccess={() => { setIsAdding(false); setCurrentEdit(null); fetchAllProducts(); }}
                        />

                    <div className="bg-white border border-primary-100 rounded-3xl overflow-hidden shadow-sm">

                                        </td>
                                        <td className="px-6 py-2"></td>

                                            <select

                                            >

        // --- COMPONENTE PRINCIPAL (RUTEO & ESTADO) ---

        const App = () => {
            const [route, setRoute] = React.useState(window.location.hash || '#');
            const [selectedProduct, setSelectedProduct] = React.useState(null);
            const [activeRefUrl, setActiveRefUrl] = React.useState(null);
            const [user, setUser] = React.useState(null);
            const [loadingAuth, setLoadingAuth] = React.useState(true);
            const [products, setProducts] = React.useState([]);
            const [loadingProducts, setLoadingProducts] = React.useState(true);

            // Fetch public products once and share among views
            const fetchProducts = async (force = false) => {
                setLoadingProducts(true);
                const cached = getCachedProducts();
                if (cached && !force) {
                    setProducts(cached);
                    setLoadingProducts(false);
                    return;
                }

                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (!error && data) {
                    setProducts(data);
                    setCachedProducts(data);
                } else {
                    console.error('Error fetching products:', error);
                }
                setLoadingProducts(false);
            };

            React.useEffect(() => {
                fetchProducts();
            }, []);

            // Escuchar cambios de hash de ruta
            React.useEffect(() => {
                const handleHashChange = () => {
                    const hash = window.location.hash || '#';
                    setRoute(hash);
                    if (!hash.startsWith('#product-')) {
                        setSelectedProduct(null); // Limpiar modal de producto si navegamos
                    }
                };
                window.addEventListener('hashchange', handleHashChange);
                
                // Chequear estado inicial de autenticación
                supabase.auth.getSession().then(({ data: { session } }) => {
                    setUser(session?.user ?? null);
                    setLoadingAuth(false);
                });

                // Escuchar cambios de Auth
                const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
                    setUser(session?.user ?? null);
                    setLoadingAuth(false);
                });

                return () => {
                    window.removeEventListener('hashchange', handleHashChange);
                    subscription.unsubscribe();
                };
            }, []);

            // Deep-link check for specific product modal auto-open
            React.useEffect(() => {
                if (products.length > 0 && route.startsWith('#product-')) {
                    const prodId = route.replace('#product-', '');
                    const found = products.find(p => p.id === prodId);
                    if (found) {
                        setSelectedProduct(found);
                    }
                }
            }, [products, route]);

            const handleLogout = async () => {
                await supabase.auth.signOut();
                window.location.hash = '#';
            };

            const renderContent = () => {
                if (loadingAuth) {
                    return (
                        <div className="flex-grow flex items-center justify-center py-24">
                            <div className="animate-spin rounded-full h-10 w-10 border-b-2 border-primary-900"></div>
                        </div>
                    );
                }

                if (route.startsWith('#/admin')) {
                    if (!user) {
                        return <LoginForm onLoginSuccess={(u) => setUser(u)} />;
                    }
                    return <AdminDashboard />;
                }

                // Public index
                return (
                    <PublicPage 
                        products={products} 
                        loading={loadingProducts} 
                        fetchProducts={fetchProducts} 
                        onSelectProduct={(p) => setSelectedProduct(p)} 
                        onSelectReference={(url) => setActiveRefUrl(url)}
                    />
                );
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <Header isAdmin={!!user} onLogout={handleLogout} />
                    <div className="flex-grow flex flex-col">
                        {renderContent()}
                    </div>
                    <Footer />
                    {selectedProduct && (
                        <ProductModal 
                            product={selectedProduct} 
                            onClose={() => {
                                setSelectedProduct(null);
                                // Clear the deep-linked hash to restore normal URL on close
                                if (window.location.hash.startsWith('#product-')) {
                                    window.history.pushState(null, '', window.location.pathname + window.location.search);
                                }
                            }}
                            onSelectReference={(url) => setActiveRefUrl(url)}
                        />
                    )}
                    {activeRefUrl && (
                        <ReferenceModal 
                            url={activeRefUrl} 
                            onClose={() => setActiveRefUrl(null)} 
                        />
                    )}
                </div>
            );
        };

        // Renderizar la app en el DOM
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
