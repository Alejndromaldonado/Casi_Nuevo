                            </div>
                            <div>

                        <div className="mt-8 border-t border-gray-700 pt-8 text-center text-sm text-gray-400">

                </footer>
            );
        };
        
        // From: App.tsx
        const App = () => {
            const [selectedProduct, setSelectedProduct] = React.useState(null);
            const [searchQuery, setSearchQuery] = React.useState('');
            const [activeCategory, setActiveCategory] = React.useState('Todos');

            const handleSelectProduct = (product) => setSelectedProduct(product);
            const handleCloseModal = () => setSelectedProduct(null);

            const handleContactAboutItem = (productName) => {
                const message = `Hola, estoy interesado/a en el producto "${productName}".`;
                const whatsappUrl = `https://wa.me/${WHATSAPP_PHONE_NUMBER}?text=${encodeURIComponent(message)}`;
                window.open(whatsappUrl, '_blank', 'noopener,noreferrer');
                setSelectedProduct(null);
            };

            const categories = ['Todos', ...Array.from(new Set(PRODUCTS.map(p => p.category)))];

            const filteredProducts = React.useMemo(() => {
                return PRODUCTS.filter(product => {
                    const matchesCategory = activeCategory === 'Todos' || product.category === activeCategory;
                    const matchesSearch = product.name.toLowerCase().includes(searchQuery.toLowerCase()) || product.description.toLowerCase().includes(searchQuery.toLowerCase());
                    return matchesCategory && matchesSearch;
                });
            }, [searchQuery, activeCategory]);

            return (
                <div className="min-h-screen flex flex-col font-sans text-gray-800 bg-white">
                    <Header />
                    <Hero />
                    <main className="flex-grow container mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <section id="products" className="py-16">
                            <div className="text-center mb-12">
                                <h2 className="text-3xl md:text-4xl font-bold tracking-tight text-gray-900">Productos Disponibles</h2>
                                <p className="mt-4 max-w-2xl mx-auto text-lg text-gray-600">Encuentra todo lo que necesitas para tu hogar a precios increíbles. Todos los artículos están en excelente estado.</p>
                            </div>
                            <div className="mb-8 flex flex-col md:flex-row gap-4 justify-center items-center">
                                <div className="relative w-full md:w-1/3">
                                    <input type="text" placeholder="Buscar productos..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                    <svg className="absolute left-3 top-1/2 -translate-y-1/2 h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                </div>
                            </div>
                            <div className="mb-12 flex justify-center flex-wrap gap-2">
                                {categories.map(category => (
                                    <button key={category} onClick={() => setActiveCategory(category)} className={`px-4 py-2 rounded-full text-sm font-semibold transition-colors ${activeCategory === category ? 'bg-gray-800 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>
                                        {category}
                                    </button>
                                ))}
                            </div>
                            <ProductGrid products={filteredProducts} onSelectProduct={handleSelectProduct} />
                        </section>
                        <section id="contact" className="py-16">
                            <ContactForm products={PRODUCTS} />
                        </section>
                    </main>
                    {selectedProduct && <ProductModal product={selectedProduct} onClose={handleCloseModal} onContact={handleContactAboutItem} />}
                    <Footer />
                </div>
            );
        };

        // Render the application
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);

    </script>
</body>
</html>
